syntax = "proto3";

package raft;

// Raft 内部服务 - 节点间通信
service RaftService {
    // 领导者选举
    rpc RequestVote(VoteRequest) returns (VoteResponse);

    // 预投票（PreVote 优化）
    rpc PreVote(PreVoteRequest) returns (PreVoteResponse);

    // 日志复制和心跳
    rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);

    // 快照安装
    rpc InstallSnapshot(InstallSnapshotRequest) returns (InstallSnapshotResponse);

    // Leader 转移
    rpc TransferLeader(TransferLeaderRequest) returns (TransferLeaderResponse);

    // 触发立即选举（Leader 转移用）
    rpc TimeoutNow(TimeoutNowRequest) returns (TimeoutNowResponse);

    // 成员变更
    rpc AddNode(AddNodeRequest) returns (AddNodeResponse);
    rpc RemoveNode(RemoveNodeRequest) returns (RemoveNodeResponse);
}

// ============ 投票消息 ============

message VoteRequest {
    uint64 term = 1;
    uint32 candidate_id = 2;
    uint64 last_log_index = 3;
    uint64 last_log_term = 4;
}

message VoteResponse {
    uint64 term = 1;
    bool vote_granted = 2;
}

// ============ 预投票消息（PreVote 优化） ============

message PreVoteRequest {
    uint64 term = 1;              // 候选人预期的任期（current_term + 1）
    uint32 candidate_id = 2;      // 候选人 ID
    uint64 last_log_index = 3;    // 候选人最后日志索引
    uint64 last_log_term = 4;     // 候选人最后日志任期
}

message PreVoteResponse {
    uint64 term = 1;              // 响应者的当前任期
    bool vote_granted = 2;        // 是否同意预投票
}

// ============ 日志复制消息 ============

message AppendEntriesRequest {
    uint64 term = 1;
    uint32 leader_id = 2;
    uint64 prev_log_index = 3;
    uint64 prev_log_term = 4;
    repeated LogEntry entries = 5;
    uint64 leader_commit = 6;
}

message LogEntry {
    uint64 term = 1;
    uint64 index = 2;
    bytes command = 3;
}

message AppendEntriesResponse {
    uint64 term = 1;
    bool success = 2;
    uint64 match_index = 3;
}

// ============ 快照消息 ============

message InstallSnapshotRequest {
    uint64 term = 1;
    uint32 leader_id = 2;
    uint64 last_included_index = 3;
    uint64 last_included_term = 4;
    bytes data = 5;
}

message InstallSnapshotResponse {
    uint64 term = 1;
}

// ============ Leader 转移消息 ============

message TransferLeaderRequest {
    uint64 term = 1;              // Leader 的当前任期
    uint32 leader_id = 2;         // 当前 Leader ID
    uint32 target_id = 3;         // 目标节点 ID
}

message TransferLeaderResponse {
    uint64 term = 1;              // 响应者的当前任期
    bool success = 2;             // 是否接受转移请求
}

// ============ TimeoutNow 消息（Leader 转移用） ============

message TimeoutNowRequest {
    uint64 term = 1;              // Leader 的当前任期
}

message TimeoutNowResponse {
    uint64 term = 1;              // 响应者的当前任期
}

// ============ 成员变更消息 ============

message AddNodeRequest {
    uint64 term = 1;              // Leader 的当前任期
    uint32 leader_id = 2;         // Leader ID
    uint32 node_id = 3;           // 新节点 ID
    string node_addr = 4;         // 新节点的 Raft 地址
}

message AddNodeResponse {
    uint64 term = 1;              // 响应者的当前任期
    bool success = 2;             // 是否成功
}

message RemoveNodeRequest {
    uint64 term = 1;              // Leader 的当前任期
    uint32 leader_id = 2;         // Leader ID
    uint32 node_id = 3;           // 要移除的节点 ID
}

message RemoveNodeResponse {
    uint64 term = 1;              // 响应者的当前任期
    bool success = 2;             // 是否成功
}

// ============ 配置变更日志条目 ============

message ConfigChange {
    enum ChangeType {
        ADD_NODE = 0;
        REMOVE_NODE = 1;
    }
    ChangeType change_type = 1;
    uint32 node_id = 2;
    string node_addr = 3;         // 仅 ADD_NODE 时有效
}
